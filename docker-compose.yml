services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: spotify-helper-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-spotify_helper}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-spotify_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (BullMQ job queues)
  redis:
    image: redis:7-alpine
    container_name: spotify-helper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API — runs `prisma migrate deploy && node dist/src/main.js`
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spotify-helper-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-spotify_helper}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"

  # Frontend — nginx serving pre-built static files
  # VITE_API_URL is baked into the JS bundle at build time (ARG in Dockerfile)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: spotify-helper-frontend
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
